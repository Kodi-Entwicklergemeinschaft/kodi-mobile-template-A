name: shared_dependencies
description: "Shared Preferences of the application"
version: 0.0.1
publish_to: none
homepage:

environment:
  sdk: '>=3.2.4 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  dartz: ^0.10.1
  device_info_plus: ^12.2.0
  package_info_plus: ^8.0.0
  go_router: ^16.3.0
  collection: ^1.19.1
  intl: ^0.20.2
  flutter_svg: ^2.0.10
  equatable: ^2.0.7
  uuid: ^4.5.2
  shimmer: ^3.0.0
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  flutter_inappwebview: ^6.1.5
  add_2_calendar: ^3.0.1
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.0.3
  custom_lint: ^0.8.0
  flutter_launcher_icons: ^0.14.4


